name: Backend CI

# Runs automatically every time you push code or open a pull request.
# This is entirely free on public GitHub repos (and has a generous free
# tier on private repos too).
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Run backend tests
        working-directory: ./backend
        run: mvn -B test
