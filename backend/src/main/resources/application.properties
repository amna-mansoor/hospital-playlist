# ============================================================
# All secrets below are read from ENVIRONMENT VARIABLES.
# Never hard-code real passwords/secrets in this file. Locally,
# you'll create a ".env"-style setup (see SETUP_GUIDE.md, Part 4).
# On Render.com, you set these as "Environment Variables" in the
# dashboard (also covered in SETUP_GUIDE.md).
# ============================================================

spring.application.name=hospital-system

# --- Database (Neon/Supabase Postgres) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# "update" auto-creates/updates tables from your @Entity classes - perfect
# for a portfolio project. In a real production system you'd switch to a
# migration tool like Flyway and set this to "validate" instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# --- Gmail SMTP (for confirmations, reminders, waitlist emails) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Server ---
server.port=${PORT:8080}

# --- Actuator health check (Render pings this to know your app is alive) ---
management.endpoints.web.exposure.include=health
