# ============================================================
# All secrets below are read from ENVIRONMENT VARIABLES.
# Never hard-code real passwords/secrets in this file. Locally,
# you'll create a ".env"-style setup (see SETUP_GUIDE.md, Part 4).
# On Render.com, you set these as "Environment Variables" in the
# dashboard (also covered in SETUP_GUIDE.md).
# ============================================================

spring.application.name=hospital-system

# --- Database (Neon/Supabase Postgres) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# "update" auto-creates/updates tables from your @Entity classes - perfect
# for a portfolio project. In a real production system you'd switch to a
# migration tool like Flyway and set this to "validate" instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Connection pool tuning for Neon's free tier ---
# Neon's free tier suspends its database compute after a few minutes of
# inactivity to save resources. When that happens, any connections our pool
# was holding onto go stale. These settings make HikariCP recycle
# connections proactively (max-lifetime shorter than Neon's own timeout)
# and validate a connection with a quick query before handing it to your
# code, so a stale connection gets replaced automatically instead of
# surfacing as an error in the middle of a request.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=20000
spring.datasource.hikari.max-lifetime=270000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# --- JWT ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# --- Gmail SMTP (for confirmations, reminders, waitlist emails) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Server ---
server.port=${PORT:8080}

# --- Actuator health check (Render pings this to know your app is alive) ---
management.endpoints.web.exposure.include=health