# Used only when running "mvn test" (e.g. in GitHub Actions).
# Points at an in-memory H2 database so tests don't need a real Postgres server.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.jwt.secret=test-secret-key-for-ci-pipeline-only-not-for-prod-use-1234567890
app.jwt.expiration-ms=3600000

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
